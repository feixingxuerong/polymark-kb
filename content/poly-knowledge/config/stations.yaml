# === 匹配规则配置 ===
# 用于自动绑定 stations 到 watchlist items
binding:
  # 匹配优先级
  priority:
    - icao          # 最高优先级: KJFK, KLAX
    - iata          # 次优先级: JFK, LAX
    - name          # 城市/机场名
    - city          # 城市名
  
  # 最大绑定站点数
  max_stations: 3
  
  # fallback 通用站点 (当无匹配时)
  fallback:
    - KJFK  # JFK - 最常用 fallback
    - KORD  # Chicago - 中西部代表
    - KLAX  # LA - 西海岸代表

# === 常用城市名映射 ===
# 用于从 question/description 中提取城市名
