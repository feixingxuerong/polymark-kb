# ============================================================
# Weather/Airport Stations Configuration
# 
# 用于 polymark-task 市场的气象站/机场选点库
# 覆盖美国主要大型枢纽 + 部分区域机场
# 
# 字段说明:
# - name: 机场/城市全称
# - icao: 4-letter ICAO 代码 (用于 METAR/TAF)
# - iata: 3-letter IATA 代码 (用于航班查询)
# - nws_station: NWS 观测站代码 (用于实时数据)
# - grid: NWS 预报网格 ID (用于 forecast API)
#   - gridId: NWS grid ID (如 "OKX", "MIA", "Den")
#   - gridX, gridY: 网格坐标
#   - forecastUrl: 预报 API URL
# - tags: 适用的市场标签
# 
# 使用方式:
# - weather/aviation 市场自动匹配 stations.yaml
# - 优先匹配 ICAO/IATA 代码
# - 其次匹配城市名/州名
# 
# Last updated: 2026-02-28
# ============================================================

