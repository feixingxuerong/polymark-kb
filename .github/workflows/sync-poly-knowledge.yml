name: Sync poly-knowledge

on:
  workflow_dispatch:
  schedule:
    # every 2 hours
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kb site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch polymark-task (source via GitHub API tarball)
        env:
          GH_TOKEN: ${{ secrets.POLY_TASK_TOKEN }}
        run: |
          rm -rf source source.tgz
          gh api -H "Accept: application/vnd.github+json" \
            /repos/feixingxuerong/polymark-task/tarball/main > source.tgz
          mkdir -p source
          tar -xzf source.tgz -C source --strip-components=1

      - name: Sync files
        run: |
          rm -rf content/poly-knowledge
          mkdir -p content/poly-knowledge
          cp -r source/poly-knowledge/. content/poly-knowledge/

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/poly-knowledge
          git commit -m "chore(sync): update poly-knowledge"
          git push
